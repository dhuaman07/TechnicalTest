services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Tawa832*"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Tawa832*" -Q "SELECT 1" -b -o /dev/null -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    command: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'Tawa832*' -C
      -Q \"IF NOT EXISTS (SELECT * FROM sys.databases WHERE name='TestDB') CREATE DATABASE TestDB\"
      "
    restart: "no"

  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      SPRING_R2DBC_URL: r2dbc:mssql://sqlserver:1433/TestDB?trustServerCertificate=true
      SPRING_R2DBC_USERNAME: sa
      SPRING_R2DBC_PASSWORD: "Tawa832*"
    depends_on:
      db-init:
        condition: service_completed_successfully
